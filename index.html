<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>APK Archive</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8e8e8; font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #222; }

/* HEADER */
#header { background: #00838f; padding: 0; border-bottom: 3px solid #006064; }
#header-inner { max-width: 960px; margin: 0 auto; padding: 10px 12px; }
#header h1 { color: #fff; font-size: 20px; font-weight: bold; display: inline; vertical-align: middle; }
#header-sub { color: #b2ebf2; font-size: 12px; margin-top: 2px; }
#random-btn { float: right; background: #006064; color: #fff; border: 1px solid #004d55; padding: 6px 12px; cursor: pointer; font-size: 13px; border-radius: 2px; margin-top: 4px; }
#random-btn:active { background: #004d55; }

/* SEARCH FORM */
#search-bar { background: #006064; padding: 10px 12px; border-bottom: 2px solid #004d55; }
#search-bar-inner { max-width: 960px; margin: 0 auto; }
#search-bar label { display: inline-block; color: #e0f7fa; font-size: 12px; margin-right: 8px; margin-bottom: 6px; vertical-align: top; }
#search-bar input[type=text], #search-bar select { display: block; padding: 5px 7px; border: 1px solid #ccc; font-size: 13px; width: 160px; border-radius: 2px; background: #fff; color: #222; }
#search-bar input[type=text].wide { width: 200px; }
#search-bar .row { margin-bottom: 6px; }
#search-bar .check-label { line-height: 28px; }
#search-bar input[type=checkbox] { width: 16px; height: 16px; vertical-align: middle; }
#search-btn { background: #e65100; color: #fff; border: none; padding: 7px 20px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 2px; margin-top: 4px; }
#search-btn:active { background: #bf360c; }

/* RESULTS INFO */
#results-info { max-width: 960px; margin: 10px auto 0; padding: 0 12px; color: #555; font-size: 12px; }

/* CONTENT */
#content { max-width: 960px; margin: 8px auto; padding: 0 12px 20px; }

/* HOMESCREEN */
#homescreen { max-width: 960px; margin: 0 auto; padding: 12px; }
.home-stat-row { overflow: hidden; margin-bottom: 12px; }
.home-stat { float: left; background: #fff; border: 1px solid #ccc; border-top: 3px solid #00838f; width: 30%; margin-right: 3%; padding: 12px; text-align: center; }
.home-stat:last-child { margin-right: 0; }
.home-stat-num { font-size: 26px; font-weight: bold; color: #00838f; }
.home-stat-label { font-size: 12px; color: #666; margin-top: 2px; }
.home-section { background: #fff; border: 1px solid #ccc; border-top: 3px solid #00838f; margin-bottom: 12px; padding: 12px; }
.home-section h2 { font-size: 14px; color: #006064; margin-bottom: 10px; border-bottom: 1px solid #e0f2f1; padding-bottom: 6px; }
.home-grid { overflow: hidden; }
.home-app { float: left; width: 48%; margin-right: 2%; margin-bottom: 8px; overflow: hidden; cursor: pointer; padding: 4px; border: 1px solid transparent; border-radius: 2px; }
.home-app:nth-child(2n) { margin-right: 0; }
.home-app:active { background: #e0f2f1; border-color: #b2dfdb; }
.home-app-icon { float: left; width: 40px; height: 40px; margin-right: 8px; }
.home-app-icon .icon-placeholder { width: 40px; height: 40px; background: #00838f; color: #fff; font-size: 16px; font-weight: bold; line-height: 40px; text-align: center; display: block; border-radius: 2px; }
.home-app-body { overflow: hidden; }
.home-app-name { font-size: 13px; font-weight: bold; color: #006064; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.home-app-pkg  { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.home-app-sdk  { font-size: 11px; color: #555; }
.home-cat-btn { display: inline-block; background: #e0f2f1; color: #006064; border: 1px solid #b2dfdb; border-radius: 2px; padding: 5px 10px; margin: 3px; cursor: pointer; font-size: 12px; }
.home-cat-btn:active { background: #b2dfdb; }

/* STATUS BAR */
#status-bar { max-width: 960px; margin: 8px auto 0; padding: 0 12px; }
.status-msg { background: #fff3e0; border: 1px solid #ffe0b2; color: #e65100; padding: 8px 12px; font-size: 13px; border-radius: 2px; }
.status-msg.err { background: #ffebee; border-color: #ffcdd2; color: #c62828; }
.status-msg.ok  { background: #e8f5e9; border-color: #c8e6c9; color: #2e7d32; }

/* ENTRIES */
.entry { background: #fff; border: 1px solid #ccc; border-top: 3px solid #00838f; margin-bottom: 10px; padding: 10px; overflow: hidden; }
.entry-icon { float: left; width: 64px; height: 64px; margin-right: 10px; }
.entry-icon .icon-placeholder { width: 64px; height: 64px; background: #00838f; color: #fff; font-size: 22px; font-weight: bold; line-height: 64px; text-align: center; display: block; border-radius: 2px; }
.entry-icon img { width: 64px; height: 64px; }
.entry-body { overflow: hidden; }
.entry-name { font-size: 16px; font-weight: bold; color: #006064; margin-bottom: 4px; }
.entry-pkg { font-size: 12px; color: #555; margin-bottom: 6px; font-family: monospace; }
.meta-table { border-collapse: collapse; width: 100%; font-size: 12px; margin-bottom: 8px; }
.meta-table td { padding: 2px 6px 2px 0; vertical-align: top; color: #333; }
.meta-table td:first-child { color: #666; width: 110px; white-space: nowrap; }
.badge { display: inline-block; background: #e0f2f1; color: #00695c; border: 1px solid #b2dfdb; border-radius: 2px; padding: 1px 5px; font-size: 11px; margin: 1px 2px 1px 0; }
.btn-row { margin-top: 6px; }
.dl-btn { display: inline-block; background: #00838f; color: #fff; border: none; padding: 6px 14px; font-size: 12px; cursor: pointer; border-radius: 2px; text-decoration: none; margin-right: 6px; margin-bottom: 4px; }
.dl-btn:active { background: #006064; }
.dl-btn.obb { background: #5d4037; }
.dl-btn.obb:active { background: #3e2723; }
.show-all { font-size: 12px; color: #00838f; cursor: pointer; text-decoration: underline; display: inline-block; margin-top: 4px; }
.entry.short .entry-icon { width: 48px; height: 48px; }
.entry.short .entry-icon .icon-placeholder { width: 48px; height: 48px; font-size: 18px; line-height: 48px; }
.entry.short .entry-icon img { width: 48px; height: 48px; }
.entry.short .entry-name { font-size: 14px; margin-bottom: 2px; }

/* PAGINATION */
#pagination { text-align: center; margin: 10px 0 20px; }
#pagination button { background: #00838f; color: #fff; border: none; padding: 7px 18px; font-size: 13px; cursor: pointer; border-radius: 2px; margin: 2px; }
#pagination button:disabled { background: #aaa; cursor: default; }
#pagination button.active { background: #006064; font-weight: bold; }

/* MISC */
.clearfix:after { content: ""; display: table; clear: both; }
#no-results { text-align: center; padding: 30px; color: #888; font-size: 15px; }
.sdk-note { font-size: 11px; color: #888; }
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <button id="random-btn" onclick="randomAPK()">&#9654; Random</button>
    <h1>APK Archive</h1>
    <div id="header-sub">Searchable index of APK files hosted on archive.org</div>
  </div>
</div>

<div id="search-bar">
  <div id="search-bar-inner">
    <div class="row">
      <label>App Name / Keyword<br><input type="text" id="s-name" class="wide" placeholder="e.g. angry birds"></label>
      <label>Package ID<br><input type="text" id="s-pkg" placeholder="e.g. com.rovio."></label>
      <label>Architecture<br>
        <select id="s-abi">
          <option value="">Any</option>
          <option value="arm64-v8a">arm64-v8a</option>
          <option value="armeabi-v7a">armeabi-v7a</option>
          <option value="armeabi">armeabi</option>
          <option value="x86">x86</option>
          <option value="x86_64">x86_64</option>
        </select>
      </label>
      <label>Min SDK (max)<br><input type="text" id="s-minsdk" placeholder="e.g. 10"></label>
      <label class="check-label"><br><input type="checkbox" id="s-unique" checked> Unique packages only</label>
      <label class="check-label"><br><input type="checkbox" id="s-hasobb"> Has OBB bundle</label>
    </div>
    <button id="search-btn" onclick="doSearch()">Search</button>
  </div>
</div>

<div id="status-bar"></div>
<div id="results-info"></div>
<div id="homescreen"></div>
<div id="content"></div>
<div id="pagination"></div>

<script>
var DB = [];
var DB_LOADED = false;
var currentResults = [];
var PAGE_SIZE = 10;
var currentPage = 0;
var searchHasRun = false;

var SDK_NAMES = {7:"2.1",8:"2.2",9:"2.3",10:"2.3.3",14:"4.0",15:"4.0.3",16:"4.1",17:"4.2",18:"4.3",19:"4.4",21:"5.0",23:"6.0",26:"8.0",28:"9.0",29:"10",30:"11"};

function sdkLabel(n) {
  if (!n) return "?";
  var s = SDK_NAMES[n];
  return "API " + n + (s ? " (Android " + s + ")" : "");
}

// ── DB LOAD ───────────────────────────────────────────────────────────────────
function loadDB() {
  setStatus("Loading database...", "");
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "data/db.json", true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) {
      try {
        DB = JSON.parse(xhr.responseText);
        DB_LOADED = true;
        clearStatus();
        var fromURL = loadURL();
        if (!fromURL) renderHomescreen();
      } catch(e) {
        setStatus("Failed to parse database: " + e, "err");
        renderHomescreenFallback();
      }
    } else if (xhr.status === 404 || xhr.status === 0) {
      // No db.json yet — use built-in mock data
      DB = MOCK_DB;
      DB_LOADED = true;
      setStatus("No data/db.json found — showing demo data. Run the crawler to build a real database.", "");
      var fromURL = loadURL();
      if (!fromURL) renderHomescreen();
    } else {
      setStatus("Error loading database (HTTP " + xhr.status + ")", "err");
      renderHomescreenFallback();
    }
  };
  xhr.send();
}

function setStatus(msg, cls) {
  var bar = document.getElementById("status-bar");
  bar.innerHTML = '<div class="status-msg ' + (cls||"") + '">' + esc(msg) + '</div>';
}
function clearStatus() {
  document.getElementById("status-bar").innerHTML = "";
}

// ── HOMESCREEN ────────────────────────────────────────────────────────────────
function renderHomescreen() {
  if (searchHasRun) return;
  var hs = document.getElementById("homescreen");

  // Stats
  var pkgs = {}, withObb = 0;
  for (var i = 0; i < DB.length; i++) {
    if (DB[i].pkg) pkgs[DB[i].pkg] = true;
    if (DB[i].obb) withObb++;
  }
  var html = '<div class="home-stat-row clearfix">';
  html += '<div class="home-stat"><div class="home-stat-num">' + DB.length + '</div><div class="home-stat-label">Total APKs</div></div>';
  html += '<div class="home-stat"><div class="home-stat-num">' + Object.keys(pkgs).length + '</div><div class="home-stat-label">Unique apps</div></div>';
  html += '<div class="home-stat"><div class="home-stat-num">' + withObb + '</div><div class="home-stat-label">With OBB bundle</div></div>';
  html += '</div>';

  // Quick filters
  html += '<div class="home-section"><h2>&#9654; Quick Filters</h2>';
  var filters = [
    ["All APKs", ""],
    ["With OBB", "?obb=1"],
    ["Android 2.x compatible (API &le; 10)", "?minsdk=10"],
    ["Android 4.x compatible (API &le; 15)", "?minsdk=15"],
    ["armeabi-v7a only", "?abi=armeabi-v7a"],
    ["Pure Java (no native libs)", "?abi="],
  ];
  for (var f = 0; f < filters.length; f++) {
    html += '<span class="home-cat-btn" onclick="quickFilter(' + f + ')">' + filters[f][0] + '</span>';
  }
  html += '</div>';

  // Recently added (last 8 in DB)
  var recent = DB.slice(-8).reverse();
  html += '<div class="home-section"><h2>&#128337; Recently Added</h2><div class="home-grid clearfix">';
  for (var r = 0; r < recent.length; r++) html += miniAppHTML(recent[r]);
  html += '</div></div>';

  // Apps with OBB
  var obbApps = [];
  for (var o = 0; o < DB.length && obbApps.length < 8; o++) {
    if (DB[o].obb) obbApps.push(DB[o]);
  }
  if (obbApps.length) {
    html += '<div class="home-section"><h2>&#128230; Apps with OBB Bundle</h2><div class="home-grid clearfix">';
    for (var ob = 0; ob < obbApps.length; ob++) html += miniAppHTML(obbApps[ob]);
    html += '</div></div>';
  }

  hs.innerHTML = html;

  // store filter list for onclick
  window._quickFilters = filters;
}

window._quickFilters = [];
function quickFilter(idx) {
  var f = window._quickFilters[idx];
  if (!f) return;
  // parse the fake query string
  var qs = f[1].replace("?","");
  var parts = qs ? qs.split("&") : [];
  // reset all
  document.getElementById("s-name").value = "";
  document.getElementById("s-pkg").value = "";
  document.getElementById("s-abi").value = "";
  document.getElementById("s-minsdk").value = "";
  document.getElementById("s-unique").checked = true;
  document.getElementById("s-hasobb").checked = false;
  for (var i = 0; i < parts.length; i++) {
    var kv = parts[i].split("=");
    var k = kv[0], v = decodeURIComponent(kv[1] || "");
    if (k === "obb")    document.getElementById("s-hasobb").checked = true;
    if (k === "minsdk") document.getElementById("s-minsdk").value = v;
    if (k === "abi")    document.getElementById("s-abi").value = v;
  }
  doSearch();
}

function renderHomescreenFallback() {
  document.getElementById("homescreen").innerHTML =
    '<div style="padding:20px;color:#888;text-align:center">Could not load the APK database.</div>';
}

function miniAppHTML(e) {
  var letter = (e.name || "?").charAt(0).toUpperCase();
  var icon = e.icon
    ? '<img src="' + esc(e.icon) + '" width="40" height="40" alt="">'
    : '<span class="icon-placeholder">' + letter + '</span>';
  return '<div class="home-app clearfix" onclick="showEntry(' + e.id + ')">'
    + '<div class="home-app-icon">' + icon + '</div>'
    + '<div class="home-app-body">'
    + '<div class="home-app-name">' + esc(e.name || "Unknown") + '</div>'
    + '<div class="home-app-pkg">' + esc(e.pkg || "") + '</div>'
    + '<div class="home-app-sdk">Min: ' + sdkLabel(e.minsdk) + '</div>'
    + '</div></div>';
}

function showEntry(id) {
  for (var i = 0; i < DB.length; i++) {
    if (DB[i].id === id) { renderSingle(DB[i]); return; }
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function doSearch() {
  if (!DB_LOADED) { setStatus("Database not loaded yet, please wait...", ""); return; }
  var name   = document.getElementById("s-name").value.toLowerCase().trim();
  var pkg    = document.getElementById("s-pkg").value.toLowerCase().trim();
  var abi    = document.getElementById("s-abi").value;
  var maxsdk = parseInt(document.getElementById("s-minsdk").value, 10);
  var unique = document.getElementById("s-unique").checked;
  var hasobb = document.getElementById("s-hasobb").checked;

  var seen = {}, res = [];
  for (var i = 0; i < DB.length; i++) {
    var e = DB[i];
    if (name && (e.name||"").toLowerCase().indexOf(name) === -1 && (e.pkg||"").toLowerCase().indexOf(name) === -1) continue;
    if (pkg  && (e.pkg||"").toLowerCase().indexOf(pkg) === -1) continue;
    if (abi  && (!e.abi || e.abi.indexOf(abi) === -1)) continue;
    if (!isNaN(maxsdk) && e.minsdk > maxsdk) continue;
    if (hasobb && !e.obb) continue;
    if (unique) { if (seen[e.pkg]) continue; seen[e.pkg] = true; }
    res.push(e);
  }

  currentResults = res;
  currentPage = 0;
  searchHasRun = true;
  document.getElementById("homescreen").innerHTML = "";
  clearStatus();
  renderResults();
  updateURL();
}

function randomAPK() {
  if (!DB_LOADED || DB.length === 0) return;
  var e = DB[Math.floor(Math.random() * DB.length)];
  searchHasRun = true;
  document.getElementById("homescreen").innerHTML = "";
  clearStatus();
  renderSingle(e);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function iconHTML(e, sz) {
  sz = sz || 64;
  var letter = (e.name || "?").charAt(0).toUpperCase();
  if (e.icon) return '<img src="' + esc(e.icon) + '" width="' + sz + '" height="' + sz + '" alt="">';
  return '<span class="icon-placeholder" style="width:' + sz + 'px;height:' + sz + 'px;line-height:' + sz + 'px;font-size:' + Math.floor(sz*0.36) + 'px">' + letter + '</span>';
}

function abiHTML(abis) {
  if (!abis || abis.length === 0) return '<span class="badge">pure Java</span>';
  var out = "";
  for (var i = 0; i < abis.length; i++) out += '<span class="badge">' + abis[i] + '</span>';
  return out;
}

function entryHTML(e, short) {
  var sz = short ? 48 : 64;
  var html = '<div class="entry' + (short ? ' short' : '') + ' clearfix">';
  html += '<div class="entry-icon">' + iconHTML(e, sz) + '</div>';
  html += '<div class="entry-body">';
  html += '<div class="entry-name">' + esc(e.name || "Unknown") + '</div>';
  html += '<div class="entry-pkg">' + esc(e.pkg || "") + '</div>';
  if (short) {
    html += '<table class="meta-table"><tr><td>Min SDK</td><td>' + sdkLabel(e.minsdk) + '</td></tr></table>';
    html += '<span class="show-all" onclick="showAllVersions(\'' + esc(e.pkg) + '\')">Show all versions</span>';
  } else {
    html += '<table class="meta-table">';
    html += '<tr><td>Version</td><td>' + esc(e.version||"?") + ' <span class="sdk-note">(code ' + (e.vcode||"?") + ')</span></td></tr>';
    html += '<tr><td>Min SDK</td><td>' + sdkLabel(e.minsdk) + '</td></tr>';
    html += '<tr><td>Target SDK</td><td>' + sdkLabel(e.targetsdk) + '</td></tr>';
    html += '<tr><td>ABI</td><td>' + abiHTML(e.abi) + '</td></tr>';
    html += '<tr><td>File size</td><td>' + esc(e.size||"?") + '</td></tr>';
    html += '<tr><td>Source</td><td><a href="https://archive.org" rel="noopener noreferrer nofollow">archive.org</a></td></tr>';
    html += '</table>';
    html += '<div class="btn-row">';
    html += '<a class="dl-btn" href="' + esc(e.apk) + '" rel="noopener noreferrer nofollow">&#8659; Download APK</a>';
    if (e.obb) html += '<a class="dl-btn obb" href="' + esc(e.obb) + '" rel="noopener noreferrer nofollow">&#8659; Download OBB (.zip)</a>';
    html += '<span class="show-all" onclick="showAllVersions(\'' + esc(e.pkg) + '\')">All versions</span>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function renderResults() {
  var total = currentResults.length;
  var info = document.getElementById("results-info");
  var content = document.getElementById("content");
  if (total === 0) {
    content.innerHTML = '<div id="no-results">No results found.</div>';
    info.innerHTML = "";
    document.getElementById("pagination").innerHTML = "";
    return;
  }
  var unique = document.getElementById("s-unique").checked;
  var start = currentPage * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, total);
  info.innerHTML = "Showing " + (start+1) + "–" + end + " of " + total + " result" + (total !== 1 ? "s" : "");
  var html = "";
  for (var i = start; i < end; i++) html += entryHTML(currentResults[i], unique);
  content.innerHTML = html;
  renderPagination(total);
}

function renderSingle(e) {
  document.getElementById("results-info").innerHTML = "Random pick:";
  document.getElementById("content").innerHTML = entryHTML(e, false);
  document.getElementById("pagination").innerHTML = "";
}

function renderPagination(total) {
  var pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { document.getElementById("pagination").innerHTML = ""; return; }
  var html = "";
  if (currentPage > 0) html += '<button onclick="goPage(' + (currentPage-1) + ')">&#8592; Prev</button> ';
  var start = Math.max(0, currentPage - 2);
  var end2 = Math.min(pages - 1, currentPage + 2);
  for (var p = start; p <= end2; p++) {
    html += '<button onclick="goPage(' + p + ')"' + (p === currentPage ? ' class="active" disabled' : '') + '>' + (p+1) + '</button> ';
  }
  if (currentPage < pages - 1) html += '<button onclick="goPage(' + (currentPage+1) + ')">Next &#8594;</button>';
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderResults();
  window.scrollTo(0, 0);
}

function showAllVersions(pkg) {
  document.getElementById("s-pkg").value = pkg;
  document.getElementById("s-unique").checked = false;
  document.getElementById("s-name").value = "";
  document.getElementById("s-abi").value = "";
  document.getElementById("s-minsdk").value = "";
  document.getElementById("s-hasobb").checked = false;
  doSearch();
}

// ── URL STATE ─────────────────────────────────────────────────────────────────
function updateURL() {
  var params = [], v;
  v = document.getElementById("s-name").value;   if (v) params.push("q="      + encodeURIComponent(v));
  v = document.getElementById("s-pkg").value;    if (v) params.push("pkg="    + encodeURIComponent(v));
  v = document.getElementById("s-abi").value;    if (v) params.push("abi="    + encodeURIComponent(v));
  v = document.getElementById("s-minsdk").value; if (v) params.push("minsdk=" + encodeURIComponent(v));
  if (!document.getElementById("s-unique").checked) params.push("unique=0");
  if (document.getElementById("s-hasobb").checked)  params.push("obb=1");
  var url = window.location.pathname + (params.length ? "?" + params.join("&") : "");
  if (history.replaceState) history.replaceState(null, "", url);
}

function loadURL() {
  if (!window.location.search) return false;
  var p = window.location.search.substring(1).split("&");
  var any = false;
  for (var i = 0; i < p.length; i++) {
    var kv = p[i].split("=");
    var k = kv[0], v = decodeURIComponent(kv[1] || "");
    if (k === "q")      { document.getElementById("s-name").value = v; any = true; }
    if (k === "pkg")    { document.getElementById("s-pkg").value = v; any = true; }
    if (k === "abi")    { document.getElementById("s-abi").value = v; any = true; }
    if (k === "minsdk") { document.getElementById("s-minsdk").value = v; any = true; }
    if (k === "unique") { document.getElementById("s-unique").checked = v !== "0"; }
    if (k === "obb")    { document.getElementById("s-hasobb").checked = v === "1"; any = true; }
  }
  if (any) doSearch();
